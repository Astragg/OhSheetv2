<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EvoGenesis: Evolution Simulator</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="top-bar">
        <div class="stats">
            <span>Year: <span id="ui-year">0</span></span>
            <span>Population: <span id="ui-pop">0</span></span>
        </div>
        <div class="controls">
            <button id="btn-play">Play/Pause</button>
            <button id="btn-save">Save World</button>
            <label for="btn-load" class="upload-btn">Load World</label>
            <input type="file" id="btn-load" accept=".json" style="display: none;">
        </div>
    </header>

    <main class="app-container">
        <aside class="panel left-panel">
            <h2>Creature Info</h2>
            <div id="creature-details">Select a creature to view DNA & Stats.</div>
        </aside>

        <section class="world-view">
            <canvas id="world-canvas" width="800" height="600"></canvas>
        </section>

        <aside class="panel right-panel">
            <h2>Evolution Tree</h2>
            <div id="evo-tree-details">Global unlock timeline.</div>
        </aside>
    </main>

    <script src="js/saveSystem.js"></script>
    <script src="js/world.js"></script>
    <script src="js/creature.js"></script>
    <script src="js/evolution.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/events.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
